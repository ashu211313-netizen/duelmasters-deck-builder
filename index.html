<body>
<div class="app">

<aside class="panel"><div class="panel-title"><h2>カード編集</h2><span id="selectedStatus">未選択</span></div><div class="panel-body"><label class="upload" for="fileInput">＋画像を追加<span>複数枚OK</span></label><div id="editorEmpty" class="stat"><b>カードを選択</b><span>カードをクリックすると編集できます。</span></div><div id="editor" class="hidden"><div class="edit-preview"><img id="editImg" alt=""><div><b id="editTitle">カード名</b><p id="editSub" style="margin:5px 0 0;color:var(--muted)">編集できます</p></div></div><label>カード名<div class="name-field-wrap"><input id="nameInput" type="text" autocomplete="off"><div class="suggestion-list" id="suggestionList"></div></div></label><label>枚数（同名4枚まで）<input id="countInput" type="number" min="1" max="4"></label><label>コスト<input id="costInput" type="number" min="0" max="99"></label><label>種類<select id="typeInput"><option>クリーチャー</option><option>呪文</option><option>タマシード</option><option>クロスギア</option><option>フィールド</option><option>オーラ</option><option>城</option><option>その他</option></select></label><div><b>文明（多色は複数選択）</b><div class="checks" id="colorChecks"><label><input type="checkbox" value="火">火</label><label><input type="checkbox" value="水">水</label><label><input type="checkbox" value="自然">自然</label><label><input type="checkbox" value="光">光</label><label><input type="checkbox" value="闇">闇</label><label><input type="checkbox" value="無色">無色</label></div></div><div class="checks"><label><input id="triggerInput" type="checkbox">S・トリガー</label><label><input id="gsInput" type="checkbox">GS</label></div><button class="primary" id="rememberCardBtn">💾 このカード情報を辞書に登録</button><button class="danger" id="deleteBtn">このカードを削除</button></div></div></aside>
<main class="main"><div class="toolbar"><button class="primary" id="drawBtn">🎴 初手チェック</button><button id="sortColorBtn">文明順</button><button id="sortCostBtn">コスト順</button></div><div class="deck" id="deckList"></div></main>
<aside class="panel"><div class="panel-title"><h2>デッキ情報</h2><span id="deckCount">0 / 40</span></div><div class="panel-body"><label>デッキ名<input id="deckNameInput" type="text" value="無名デッキ"></label><div class="stat-grid"><div class="stat"><b id="triggerStat">0%</b><span>S・トリガー率</span></div><div class="stat"><b id="gsStat">0%</b><span>GS率</span></div><div class="stat"><b id="avgCostStat">0.0</b><span>平均コスト</span></div><div class="stat"><b id="typeStat">0種</b><span>種類数</span></div><div class="stat"><b id="monoStat">0枚</b><span>単色枚数</span></div><div class="stat"><b id="multiStat">0枚</b><span>多色枚数</span></div></div><div id="colorStats"></div></div><div class="panel-title"><h2>保存デッキ</h2><button class="small" id="refreshBtn">更新</button></div><div class="panel-body saved-list" id="savedList"></div></aside>
</div>
<div class="modal" id="drawModal"><div class="modal-card"><div class="modal-head"><h2 id="drawTitle">初手チェック</h2><button id="closeDrawBtn">閉じる</button></div><p id="drawNote" style="color:var(--muted)"></p><div class="hand-actions"><button id="modalMulliganBtn">🔄 マリガン</button><button id="modalDrawBtn">➕ 1ドロー</button></div><section class="draw-section"><h3>🎴 手札</h3><div class="hand-grid" id="handGrid"></div></section><section class="draw-section shield-section"><h3>🛡️ シールド</h3><div class="hand-grid" id="shieldGrid"></div></section></div></div>
<div class="modal" id="imageModal"><div class="modal-card" style="width:min(520px,100%)"><div class="modal-head"><h2 id="imageTitle">カード画像</h2><button id="closeImageBtn">閉じる</button></div><img id="bigImage" style="width:100%;border-radius:16px;border:1px solid var(--line)" alt=""></div></div>

<div class="modal" id="dictionaryModal">
  <div class="modal-card dictionary-modal-card">
    <div class="modal-head">
      <h2>📚 カード辞書</h2>
      <button id="closeDictionaryBtn">閉じる</button>
    </div>
    <div class="dictionary-toolbar">
      <input id="dictionarySearch" type="text" placeholder="カード名で検索">
      <button class="danger" id="clearDictionaryBtn">辞書を全削除</button>
    </div>
    <p id="dictionaryCount" class="dictionary-count"></p>
    <div id="dictionaryList" class="dictionary-list"></div>
  </div>
</div>
<div class="action-backdrop" id="actionBackdrop"></div><div class="action-sheet" id="actionSheet"><div class="action-handle"></div><h3 id="actionCardName">カードメニュー</h3><button id="actionEditBtn">✏️ 編集</button><button id="actionReplaceBtn">🖼️ 画像変更</button><button id="actionCopyBtn">📄 コピー</button><button id="actionShareBtn">📤 デッキ共有</button><button class="danger-text" id="actionDeleteBtn">🗑️ 削除</button><button id="actionCancelBtn">キャンセル</button></div><div class="toast" id="toast"></div>
<script>
const COLORS=["火","水","自然","光","闇","無色"],COLOR_HEX={"火":"#ef4444","水":"#2563eb","自然":"#16a34a","光":"#f59e0b","闇":"#7c3aed","無色":"#98a2b3"},DB_NAME="dm_deck_builder_stable_db",DB_VERSION=1,STORE="decks";
const PLACEHOLDER_IMG="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="300" height="420"><rect width="300" height="420" rx="18" fill="#f2f4f7"/><text x="150" y="200" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#98a2b3" font-weight="700">NO IMAGE</text></svg>`);
let state={cards:[],selectedId:null,drawState:null,actionCardId:null,dragId:null};
const $=id=>document.getElementById(id),uid=()=>crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random());
function toast(m){$("toast").textContent=m;$("toast").classList.add("show");setTimeout(()=>$("toast").classList.remove("show"),1800)}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,a=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[a]))}
const CARD_DICTIONARY_KEY="dm_card_dictionary_v1";
function loadCardDictionary(){try{const d=JSON.parse(localStorage.getItem(CARD_DICTIONARY_KEY)||"{}");return d&&typeof d==="object"?d:{}}catch(e){return{}}}
async function saveCardDictionaryEntry(c){
  const n=String(c?.name||"").trim();
  if(!n||n==="カード")return false;
  const d=loadCardDictionary();
  let thumb=imageSrc(c);
  try{thumb=await compressImage(imageSrc(c),240,.68)}catch(e){console.warn("辞書画像圧縮失敗",e)}
  d[n]={name:n,cost:Number(c.cost||0),type:c.type||"クリーチャー",colors:normalizeColors(c.colors||["無色"]),trigger:!!c.trigger,gs:!!c.gs,imageData:thumb,updatedAt:new Date().toISOString()};
  try{localStorage.setItem(CARD_DICTIONARY_KEY,JSON.stringify(d));return true}catch(e){console.warn("カード辞書保存失敗",e);return false}
}
function normalizeSearchText(t){return String(t||"").normalize("NFKC").replace(/[\s　・･ー\-_/()（）[\]【】]/g,"").toLowerCase()}
function getCardSuggestions(q,limit=5){const k=normalizeSearchText(q);if(!k)return[];return Object.values(loadCardDictionary()).map(i=>{const n=normalizeSearchText(i.name);let s=0;if(n===k)s=1000;else if(n.startsWith(k))s=700;else if(n.includes(k))s=500;else{let m=0;for(const ch of k)if(n.includes(ch))m++;s=m/Math.max(1,k.length)*100}return{...i,score:s}}).filter(i=>i.score>=50).sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name,"ja")).slice(0,limit)}
function hideSuggestions(){const l=$("suggestionList");l.classList.remove("show");l.innerHTML=""}
function renderSuggestions(q){const l=$("suggestionList"),items=getCardSuggestions(q,5);if(!items.length){hideSuggestions();return}l.innerHTML="";items.forEach(i=>{const b=document.createElement("button");b.type="button";b.className="suggestion-item";b.innerHTML=`<strong>もしかして：${escapeHtml(i.name)}？</strong><span>${escapeHtml((i.colors||["無色"]).join("・"))} / ${Number(i.cost||0)}コスト / ${escapeHtml(i.type||"クリーチャー")}${i.trigger?" / ST":""}${i.gs?" / GS":""}</span>`;b.onmousedown=e=>e.preventDefault();b.onclick=()=>applyDictionaryEntry(i);l.appendChild(b)});l.classList.add("show")}

function openDictionary(){
  $("dictionaryModal").classList.add("show");
  $("dictionarySearch").value="";
  renderDictionaryList("");
}
function closeDictionary(){$("dictionaryModal").classList.remove("show")}
function getDictionaryEntries(){
  return Object.values(loadCardDictionary()).sort((a,b)=>String(a.name).localeCompare(String(b.name),"ja"));
}
function renderDictionaryList(query=""){
  const list=$("dictionaryList");
  const q=normalizeSearchText(query);
  const items=getDictionaryEntries().filter(item=>!q||normalizeSearchText(item.name).includes(q));
  $("dictionaryCount").textContent=`登録カード：${items.length}件`;
  if(!items.length){list.innerHTML='<div class="dictionary-empty">登録されているカード情報がありません。</div>';return}
  list.innerHTML="";
  items.forEach(item=>{
    const card=document.createElement("div");
    card.className="dictionary-item";
    const img=item.imageData||PLACEHOLDER_IMG;
    const colors=(item.colors||["無色"]).join("・");
    card.innerHTML=`<img src="${img}" alt="${escapeHtml(item.name)}" onerror="this.src=PLACEHOLDER_IMG"><div><h3>${escapeHtml(item.name)}</h3><p>${escapeHtml(colors)} / ${Number(item.cost||0)}コスト<br>${escapeHtml(item.type||"クリーチャー")}${item.trigger?" / ST":""}${item.gs?" / GS":""}</p><div class="dictionary-actions"><button class="small danger" data-delete>削除</button></div></div>`;
    card.querySelector("[data-delete]").onclick=()=>deleteDictionaryEntry(item.name);
    list.appendChild(card);
  });
}
function deleteDictionaryEntry(name){
  if(!confirm(`「${name}」をカード辞書から削除しますか？`))return;
  const d=loadCardDictionary();
  delete d[name];
  try{localStorage.setItem(CARD_DICTIONARY_KEY,JSON.stringify(d));renderDictionaryList($("dictionarySearch").value);toast("カード辞書から削除しました")}catch(e){toast("削除に失敗しました")}
}
function clearDictionary(){
  if(!confirm("カード辞書をすべて削除しますか？"))return;
  if(!confirm("本当にすべて削除しますか？この操作は元に戻せません。"))return;
  localStorage.removeItem(CARD_DICTIONARY_KEY);
  renderDictionaryList("");
  toast("カード辞書を全削除しました");
}
function applyDictionaryEntry(i){const c=selectedCard();if(!c)return;if(sameNameCount(i.name,c.id)+Number(c.count||1)>4)return toast("同名カードは4枚までです");c.name=i.name;c.cost=Number(i.cost||0);c.type=i.type||"クリーチャー";c.colors=normalizeColors(i.colors||["無色"]);c.trigger=!!i.trigger;c.gs=!!i.gs;hideSuggestions();render();toast("記憶済みのカード情報を反映しました")}
function safeName(f){return f.name.replace(/\.[^/.]+$/,"").trim()||"カード"}function imageSrc(c){const s=c?.imageData||c?.imageUrl||c?.src||"";return !s||String(s).startsWith("blob:")?PLACEHOLDER_IMG:s}function normalizeColors(c){if(!c||!c.length)return["無色"];return c.includes("無色")&&c.length>1?c.filter(x=>x!=="無色"):c}
function fileToDataURL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}function loadImage(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src})}
async function compressImage(src,max=420,q=.72){if(!src||src===PLACEHOLDER_IMG)return PLACEHOLDER_IMG;try{const img=await loadImage(src),sc=Math.min(1,max/img.naturalWidth),w=Math.max(1,Math.round(img.naturalWidth*sc)),h=Math.max(1,Math.round(img.naturalHeight*sc)),can=document.createElement("canvas");can.width=w;can.height=h;const ctx=can.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);return can.toDataURL("image/jpeg",q)}catch(e){return src}}
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VERSION);r.onupgradeneeded=()=>{const db=r.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:"id"})};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function dbPut(d){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).put(d);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})}async function dbGet(id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readonly"),r=tx.objectStore(STORE).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}async function dbAll(){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readonly"),r=tx.objectStore(STORE).getAll();r.onsuccess=()=>{const a=r.result||[];a.sort((x,y)=>String(y.savedAt||"").localeCompare(String(x.savedAt||"")));res(a)};r.onerror=()=>rej(r.error)})}async function dbDelete(id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).delete(id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})}
async function addFiles(files){for(const f of[...files]){const d=await fileToDataURL(f),c={id:uid(),name:safeName(f),fileName:f.name,originalFileName:f.name,count:1,cost:1,type:"クリーチャー",colors:["無色"],trigger:false,gs:false,imageData:d,imageUrl:d};state.cards.push(c);state.selectedId=c.id}render();toast("画像を追加しました")}
function expandedDeck(){const a=[];state.cards.forEach(c=>{for(let i=0;i<Number(c.count||1);i++)a.push(c)});return a}function totalCards(){return expandedDeck().length}function selectedCard(){return state.cards.find(c=>c.id===state.selectedId)||null}function sameNameCount(n,ex=null){return state.cards.filter(c=>c.name===n&&c.id!==ex).reduce((s,c)=>s+Number(c.count||1),0)}function setSelected(id){state.selectedId=id;render()}
function render(sync=true){renderDeck();renderStats();if(sync)renderEditor()}
function renderDeck(){const list=$("deckList");list.innerHTML="";if(!state.cards.length){list.innerHTML=`<div class="stat"><b>まだカードがありません</b><span>画像を選択すると追加されます。</span></div>`;return}state.cards.forEach(card=>{const el=document.createElement("div");el.className="card"+(card.id===state.selectedId?" active":"");el.draggable=true;el.onclick=()=>setSelected(card.id);el.oncontextmenu=e=>{e.preventDefault();openAction(card.id)};let t=null;el.addEventListener("touchstart",()=>{t=setTimeout(()=>openAction(card.id),520)},{passive:true});el.addEventListener("touchmove",()=>clearTimeout(t),{passive:true});el.addEventListener("touchend",()=>clearTimeout(t),{passive:true});el.ondragstart=e=>{state.dragId=card.id;el.classList.add("dragging");e.dataTransfer.setData("text/plain",card.id)};el.ondragend=()=>{state.dragId=null;document.querySelectorAll(".card").forEach(x=>x.classList.remove("dragging","over"))};el.ondragover=e=>{e.preventDefault();if(state.dragId&&state.dragId!==card.id)el.classList.add("over")};el.ondragleave=()=>el.classList.remove("over");el.ondrop=e=>{e.preventDefault();moveCard(e.dataTransfer.getData("text/plain")||state.dragId,card.id)};const visibleCount=Math.max(1,Math.min(4,Number(card.count||1)));
const imgSlots=[];
for(let i=0;i<4;i++){
  if(i<visibleCount){
    imgSlots.push(`<img src="${imageSrc(card)}" alt="${escapeHtml(card.name)}" onerror="this.src=PLACEHOLDER_IMG">`);
  }else{
    imgSlots.push(`<span class="empty-slot" aria-hidden="true"></span>`);
  }
}
const imgs=imgSlots.join("");el.innerHTML=`<div class="stack">${imgs}</div><span class="count">×${card.count}</span><h3>${escapeHtml(card.name)}</h3><p>${card.colors.join("・")} / ${card.type} / ${card.cost}コスト ${card.trigger?" / ST":""}${card.gs?" / GS":""}</p>`;el.querySelectorAll("img").forEach(img=>img.onclick=e=>{e.stopPropagation();openImage(card)});list.appendChild(el)})}
function moveCard(f,t){if(!f||!t||f===t)return;const i=state.cards.findIndex(c=>c.id===f);if(i<0)return;const[m]=state.cards.splice(i,1),j=state.cards.findIndex(c=>c.id===t);state.cards.splice(j,0,m);render()}
function renderEditor(){const c=selectedCard();$("editorEmpty").classList.toggle("hidden",!!c);$("editor").classList.toggle("hidden",!c);$("selectedStatus").textContent=c?"選択中":"未選択";if(!c)return;$("editImg").src=imageSrc(c);$("editTitle").textContent=c.name;$("editSub").textContent=`${c.colors.join("・")} / ${c.type} / ${c.cost}コスト`;$("nameInput").value=c.name;$("countInput").value=c.count;$("costInput").value=c.cost;$("typeInput").value=c.type;$("triggerInput").checked=!!c.trigger;$("gsInput").checked=!!c.gs;document.querySelectorAll("#colorChecks input").forEach(i=>i.checked=c.colors.includes(i.value))}
function renderStats(){const total=totalCards(),exp=expandedDeck();$("deckCount").textContent=`${total} / 40`;$("deckCount").className=total===40?"ok":"warn";const st=exp.filter(c=>c.trigger).length,gs=exp.filter(c=>c.gs).length,avg=exp.length?exp.reduce((s,c)=>s+Number(c.cost||0),0)/exp.length:0,types={};exp.forEach(c=>types[c.type]=(types[c.type]||0)+1);const mono=exp.filter(c=>normalizeColors(c.colors||["無色"]).length===1).length,multi=exp.filter(c=>normalizeColors(c.colors||["無色"]).length>=2).length;$("triggerStat").textContent=total?`${Math.round(st/total*100)}%`:"0%";$("gsStat").textContent=total?`${Math.round(gs/total*100)}%`:"0%";$("avgCostStat").textContent=avg.toFixed(1);$("typeStat").textContent=`${Object.keys(types).length}種`;$("monoStat").textContent=`${mono}枚`;$("multiStat").textContent=`${multi}枚`;const counts=Object.fromEntries(COLORS.map(c=>[c,0]));exp.forEach(c=>normalizeColors(c.colors).forEach(x=>counts[x]++));$("colorStats").innerHTML=COLORS.map(c=>{const p=total?Math.round(counts[c]/total*100):0;return`<div class="color-row"><b>${c}</b><div class="bar"><i style="width:${p}%;background:${COLOR_HEX[c]}"></i></div><span>${counts[c]}</span></div>`}).join("")}
function updateSelected(p){const c=selectedCard();if(!c)return;Object.assign(c,p);c.colors=normalizeColors(c.colors);render(false);renderEditor()}
async function createPayload(comp=true){const name=$("deckNameInput").value.trim()||"無名デッキ",cards=[];for(const c of state.cards){const img=comp?await compressImage(imageSrc(c),420,.72):imageSrc(c);cards.push({...c,imageData:img,imageUrl:img})}return{id:uid(),name,deckName:name,savedAt:new Date().toISOString(),app:"DM_DECK_BUILDER",version:100,cards}}
function normalizeImportedCard(c){const img=c.imageData||c.imageUrl||c.src||PLACEHOLDER_IMG;return{id:uid(),name:c.name||"カード",fileName:c.fileName||c.originalFileName||c.name||"カード",originalFileName:c.originalFileName||c.fileName||c.name||"カード",count:Math.max(1,Math.min(4,Number(c.count||1))),cost:Number(c.cost||0),type:c.type||"クリーチャー",colors:normalizeColors(c.colors||["無色"]),trigger:!!c.trigger,gs:!!c.gs,imageData:img&&!String(img).startsWith("blob:")?img:PLACEHOLDER_IMG,imageUrl:img&&!String(img).startsWith("blob:")?img:PLACEHOLDER_IMG}}
async function saveDeck(){try{toast("画像を圧縮して保存中...");const d=await createPayload(true);await dbPut(d);if(!await dbGet(d.id))throw new Error("save check failed");await renderSaved();toast("サイト内に保存しました")}catch(e){console.error(e);toast("保存に失敗しました")}}
async function renderSaved(){const box=$("savedList");let decks=[];try{decks=await dbAll()}catch(e){}if(!decks.length){box.innerHTML=`<div class="stat"><span>保存デッキはまだありません。</span></div>`;return}box.innerHTML="";decks.forEach(d=>{const item=document.createElement("div");item.className="saved-item";item.innerHTML=`<span>${escapeHtml(d.name||d.deckName||"無名デッキ")}</span><div style="display:flex;gap:6px"><button class="small" data-load>読込</button><button class="small" data-copy>複製</button><button class="small danger" data-del>削除</button></div>`;item.querySelector("[data-load]").onclick=()=>loadSaved(d.id);item.querySelector("[data-copy]").onclick=()=>copySaved(d.id);item.querySelector("[data-del]").onclick=()=>deleteSaved(d.id);box.appendChild(item)})}
async function loadSaved(id){const d=await dbGet(id);if(!d)return toast("読み込み失敗");state.cards=(d.cards||[]).map(normalizeImportedCard);$("deckNameInput").value=d.name||d.deckName||"無名デッキ";state.selectedId=state.cards[0]?.id||null;render();toast("読み込みました")}async function copySaved(id){const d=await dbGet(id);if(!d)return;const n=(d.name||"無名デッキ")+" コピー";await dbPut({...d,id:uid(),name:n,deckName:n,savedAt:new Date().toISOString()});await renderSaved();toast("複製しました")}async function deleteSaved(id){await dbDelete(id);await renderSaved();toast("削除しました")}
async function exportData(){const d=await createPayload(true),blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${d.name.replace(/[\\/:*?"<>|]/g,"_")}.dmdeck`;a.click();URL.revokeObjectURL(a.href);toast("データ出力しました")}function importData(file){
  const r=new FileReader();

  r.onload=()=>{
    try{
      const text=String(r.result||"").trim();
      if(!text)throw new Error("empty file");

      const d=JSON.parse(text);
      if(!d||typeof d!=="object"||!Array.isArray(d.cards)){
        throw new Error("not deck data");
      }

      state.cards=d.cards.map(normalizeImportedCard);
      $("deckNameInput").value=d.name||d.deckName||"無名デッキ";
      state.selectedId=state.cards[0]?.id||null;
      state.drawState=null;

      render();
      toast("データを読み込みました");
    }catch(e){
      console.error("デッキデータ読込エラー:",e);
      toast("デッキデータではないか、ファイルが壊れています");
    }
  };

  r.onerror=()=>{
    console.error("FileReader error:",r.error);
    toast("ファイルを読み込めませんでした");
  };

  r.readAsText(file);
}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function startDraw(){const exp=expandedDeck();if(exp.length!==40)return toast("初手チェックは40枚で使えます");const deck=shuffle(exp);state.drawState={shields:deck.slice(0,5),hand:deck.slice(5,10),library:deck.slice(10),turn:0};renderDraw()}function renderDraw(){const d=state.drawState;if(!d)return;$("drawTitle").textContent=d.turn?`${d.turn}ドロー後`:"初手チェック";$("drawNote").textContent=`手札 ${d.hand.length}枚 / シールド ${d.shields.length}枚 / 山札残り ${d.library.length}枚`;$("handGrid").innerHTML=d.hand.map(c=>`<img src="${imageSrc(c)}" alt="${escapeHtml(c.name)}">`).join("");$("shieldGrid").innerHTML=d.shields.map(c=>`<img src="${imageSrc(c)}" alt="${escapeHtml(c.name)}">`).join("");$("drawModal").classList.add("show")}function oneDraw(){if(!state.drawState)return startDraw();const c=state.drawState.library.shift();if(!c)return toast("山札がありません");state.drawState.hand.push(c);state.drawState.turn++;renderDraw()}
function openImage(c){$("imageTitle").textContent=c.name;$("bigImage").src=imageSrc(c);$("imageModal").classList.add("show")}function openAction(id){const c=state.cards.find(x=>x.id===id);if(!c)return;state.actionCardId=id;state.selectedId=id;$("actionCardName").textContent=c.name;$("actionBackdrop").classList.add("show");$("actionSheet").classList.add("show");renderEditor()}function closeAction(){$("actionBackdrop").classList.remove("show");$("actionSheet").classList.remove("show");state.actionCardId=null}function copyCard(id){const c=state.cards.find(x=>x.id===id);if(!c)return;if(sameNameCount(c.name)>=4)return toast("同名カードは4枚までです");const i=state.cards.findIndex(x=>x.id===id),cp={...c,id:uid(),count:1};state.cards.splice(i+1,0,cp);state.selectedId=cp.id;render()}function deleteCard(id){state.cards=state.cards.filter(c=>c.id!==id);state.selectedId=state.cards[0]?.id||null;closeAction();render()}async function replaceImageFor(id,file){const c=state.cards.find(x=>x.id===id);if(!c||!file)return;const d=await fileToDataURL(file);c.imageData=d;c.imageUrl=d;state.selectedId=c.id;render()}
async function exportDeckImage(){
  const exp=expandedDeck();
  if(!exp.length)return toast("出力するカードがありません");

  const cols=8,cw=170,ch=238,nh=34,gx=16,gy=28,px=54,hh=230;
  const rows=Math.ceil(exp.length/cols);
  const W=px*2+cols*cw+(cols-1)*gx;
  const H=hh+rows*(ch+nh)+(rows-1)*gy+70;

  const can=document.createElement("canvas");
  can.width=W;
  can.height=H;
  const ctx=can.getContext("2d");

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="#101828";
  ctx.font="bold 46px system-ui";
  ctx.fillText($("deckNameInput").value||"無名デッキ",px,62);

  const st=exp.filter(c=>c.trigger).length;
  const gs=exp.filter(c=>c.gs).length;
  const stRate=exp.length?Math.round(st/exp.length*100):0;
  const gsRate=exp.length?Math.round(gs/exp.length*100):0;
  const mono=exp.filter(c=>normalizeColors(c.colors||["無色"]).length===1).length;
  const multi=exp.filter(c=>normalizeColors(c.colors||["無色"]).length>=2).length;

  ctx.fillStyle="#667085";
  ctx.font="24px system-ui";
  ctx.fillText(`${exp.length}/40 cards`,px,101);

  const stats=[
    {label:"S・トリガー率",value:`${stRate}%`},
    {label:"GS率",value:`${gsRate}%`},
    {label:"単色枚数",value:`${mono}枚`},
    {label:"多色枚数",value:`${multi}枚`}
  ];

  const statW=190;
  const statH=62;
  const statGap=14;
  let sx=px;
  const sy=118;

  stats.forEach(stat=>{
    ctx.fillStyle="#f8fafc";
    round(ctx,sx,sy,statW,statH,12);
    ctx.fill();

    ctx.strokeStyle="#e3e8f2";
    ctx.lineWidth=1.5;
    round(ctx,sx,sy,statW,statH,12);
    ctx.stroke();

    ctx.fillStyle="#2563eb";
    ctx.font="bold 25px system-ui";
    ctx.fillText(stat.value,sx+14,sy+28);

    ctx.fillStyle="#667085";
    ctx.font="15px system-ui";
    ctx.fillText(stat.label,sx+14,sy+50);

    sx+=statW+statGap;
  });

  const counts=Object.fromEntries(COLORS.map(c=>[c,0]));
  exp.forEach(c=>normalizeColors(c.colors).forEach(col=>counts[col]++));

  let bx=px;
  const by=192;
  COLORS.forEach(col=>{
    const text=`${col} ${counts[col]}`;
    ctx.font="bold 18px system-ui";
    const bw=ctx.measureText(text).width+26;

    ctx.fillStyle=COLOR_HEX[col];
    round(ctx,bx,by,bw,30,15);
    ctx.fill();

    ctx.fillStyle=col==="光"?"#111":"#fff";
    ctx.fillText(text,bx+13,by+21);

    bx+=bw+9;
  });

  ctx.strokeStyle="#e5e8ef";
  ctx.beginPath();
  ctx.moveTo(px,226);
  ctx.lineTo(W-px,226);
  ctx.stroke();

  for(let i=0;i<exp.length;i++){
    const c=exp[i];
    const img=await loadImage(imageSrc(c));
    const x=px+(i%cols)*(cw+gx);
    const y=hh+Math.floor(i/cols)*(ch+nh+gy);

    ctx.fillStyle="rgba(0,0,0,.10)";
    ctx.fillRect(x+4,y+5,cw,ch);
    ctx.drawImage(img,x,y,cw,ch);

    ctx.fillStyle="#101828";
    round(ctx,x,y+ch+6,cw,nh-2,8);
    ctx.fill();

    ctx.fillStyle="#fff";
    ctx.font="bold 16px system-ui";
    ctx.fillText(fit(ctx,c.name,cw-18),x+9,y+ch+29);
  }

  can.toBlob(blob=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=($("deckNameInput").value||"deck")+".png";
    a.click();
    URL.revokeObjectURL(a.href);
  });
}
function round(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}function fit(ctx,t,max){let s=String(t||"カード");if(ctx.measureText(s).width<=max)return s;while(s.length>1&&ctx.measureText(s+"…").width>max)s=s.slice(0,-1);return s+"…"}
function bind(){$("addTopBtn").onclick=()=>$("fileInput").click();$("fileInput").onchange=e=>{if(e.target.files.length)addFiles(e.target.files);e.target.value=""};$("saveBtn").onclick=saveDeck;$("importBtn").onclick=()=>$("jsonInput").click();$("jsonInput").onchange=e=>{if(e.target.files[0])importData(e.target.files[0]);e.target.value=""};$("exportDataBtn").onclick=exportData;$("dictionaryBtn").onclick=openDictionary;$("closeDictionaryBtn").onclick=closeDictionary;$("dictionaryModal").onclick=e=>{if(e.target===$("dictionaryModal"))closeDictionary()};$("dictionarySearch").oninput=e=>renderDictionaryList(e.target.value);$("clearDictionaryBtn").onclick=clearDictionary;$("exportImageBtn").onclick=exportDeckImage;$("refreshBtn").onclick=renderSaved;$("drawBtn").onclick=startDraw;$("modalMulliganBtn").onclick=startDraw;$("modalDrawBtn").onclick=oneDraw;$("closeDrawBtn").onclick=()=>$("drawModal").classList.remove("show");$("closeImageBtn").onclick=()=>$("imageModal").classList.remove("show");$("imageModal").onclick=e=>{if(e.target===$("imageModal"))$("imageModal").classList.remove("show")};$("bigImage").onclick=e=>e.stopPropagation();$("clearBtn").onclick=()=>{if(confirm("現在のデッキを全削除しますか？")){state.cards=[];state.selectedId=null;render()}};$("sortColorBtn").onclick=()=>{state.cards.sort((a,b)=>COLORS.indexOf(a.colors[0])-COLORS.indexOf(b.colors[0]));render()};$("sortCostBtn").onclick=()=>{state.cards.sort((a,b)=>Number(a.cost)-Number(b.cost));render()};$("nameInput").oninput=e=>{const c=selectedCard();if(!c)return;const raw=e.target.value,trimmed=raw.trim();if(trimmed&&sameNameCount(trimmed,c.id)+Number(c.count)>4){toast("同名カードは4枚までです");return}c.name=raw;$("editTitle").textContent=raw||"未入力";renderDeck();renderStats();renderSuggestions(raw)};$("nameInput").onfocus=e=>renderSuggestions(e.target.value);$("nameInput").onblur=e=>{const c=selectedCard();if(!c)return;const n=e.target.value.trim()||"カード";c.name=n;e.target.value=n;setTimeout(hideSuggestions,120);render()};$("countInput").oninput=e=>{const c=selectedCard();if(!c)return;let v=Math.max(1,Math.min(4,Number(e.target.value||1))),o=sameNameCount(c.name,c.id);if(o+v>4){v=Math.max(1,4-o);toast("同名カードは4枚までです")}c.count=v;e.target.value=v;render(false);renderEditor()};$("costInput").oninput=e=>updateSelected({cost:Number(e.target.value||0)});$("typeInput").onchange=e=>updateSelected({type:e.target.value});$("triggerInput").onchange=e=>updateSelected({trigger:e.target.checked});$("gsInput").onchange=e=>updateSelected({gs:e.target.checked});document.querySelectorAll("#colorChecks input").forEach(i=>i.onchange=()=>{const checked=[...document.querySelectorAll("#colorChecks input:checked")].map(x=>x.value);updateSelected({colors:checked})});$("rememberCardBtn").onclick=async()=>{
  const c=selectedCard();
  if(!c)return toast("カードを選択してください");
  const n=String(c.name||"").trim();
  if(!n||n==="カード")return toast("カード名を入力してください");
  toast("カード情報を保存中...");
  const ok=await saveCardDictionaryEntry(c);
  toast(ok?`${n} をカード辞書に登録しました`:"カード辞書への登録に失敗しました");
};$("replaceInput").onchange=e=>{const f=e.target.files[0];if(f){const id=$("replaceInput").dataset.target==="action"?state.actionCardId:state.selectedId;replaceImageFor(id,f)}$("replaceInput").dataset.target="";e.target.value=""};$("deleteBtn").onclick=()=>{if(selectedCard())deleteCard(state.selectedId)};$("actionBackdrop").onclick=closeAction;$("actionCancelBtn").onclick=closeAction;$("actionEditBtn").onclick=()=>{closeAction();window.scrollTo({top:0,behavior:"smooth"})};$("actionReplaceBtn").onclick=()=>{$("replaceInput").dataset.target="action";$("replaceInput").click()};$("actionCopyBtn").onclick=()=>{copyCard(state.actionCardId);closeAction()};$("actionDeleteBtn").onclick=()=>deleteCard(state.actionCardId);$("actionShareBtn").onclick=async()=>{closeAction();await exportData()};document.addEventListener("click",e=>{if(!e.target.closest(".name-field-wrap"))hideSuggestions()})}
bind();render();renderSaved();
